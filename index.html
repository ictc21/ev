<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장지휘관 자격인증 실기평가표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:#1a1a1a;font-size:14px}
/* Header */
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:10px 16px;text-align:center}
.header h1{font-size:16px;font-weight:bold;letter-spacing:-0.3px}
.header p{font-size:11px;margin-top:2px;opacity:.8}
.container{max-width:980px;margin:0 auto;padding:8px}
/* Tabs */
.tabs{display:flex;gap:3px;margin-bottom:0;flex-wrap:wrap}
.tab-btn{flex:1;padding:7px 6px;border:none;cursor:pointer;font-size:12px;font-weight:bold;border-radius:6px 6px 0 0;transition:all .2s;font-family:inherit;white-space:nowrap}
.tab-btn.t1{background:#dbeafe;color:#1e40af}
.tab-btn.t2{background:#d1fae5;color:#065f46}
.tab-btn.t3{background:#fce7f3;color:#9d174d}
.tab-btn.t4{background:#d1fae5;color:#065f46}
.tab-btn.t5{background:#fce7f3;color:#9d174d}
.tab-btn.t1.active{background:#1e40af;color:white}
.tab-btn.t2.active{background:#065f46;color:white}
.tab-btn.t3.active{background:#9d174d;color:white}
.tab-btn.t4.active{background:#065f46;color:white}
.tab-btn.t5.active{background:#9d174d;color:white}
.tab-btn.interview-tab{opacity:.85}
.tab-btn.interview-tab::before{content:'👥 ';font-size:11px}
/* Card */
.card{background:white;border-radius:0 6px 6px 6px;box-shadow:0 2px 10px rgba(0,0,0,.1);padding:12px}
.tab-pane{display:none}.tab-pane.active{display:block}
/* Info grid */
.info-section{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;margin-bottom:10px}
.info-title{font-size:12px;font-weight:bold;color:#64748b;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.info-grid{display:grid;gap:6px}
.info-grid-top{grid-template-columns:1fr 1fr 1fr auto;align-items:end;gap:8px}
.info-field select{width:100%;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;font-family:inherit;background:#fff;cursor:pointer}
.info-field select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.info-field label{display:block;font-size:10px;color:#6b7280;margin-bottom:2px}
.btn-ai{display:flex;align-items:center;gap:5px;padding:5px 12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s;height:29px}
.btn-ai:hover{opacity:.85}
.info-field input{width:100%;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;font-family:inherit}
.info-field input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
/* Evaluator section */
.evaluator-section{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-top:16px}
.evaluator-title{font-size:12px;font-weight:bold;color:#64748b;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.evaluator-grid{display:flex;gap:12px;align-items:end}
.evaluator-field{flex:1}
.evaluator-field label{display:block;font-size:11px;color:#6b7280;margin-bottom:3px}
.evaluator-field input{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;height:35px}
.evaluator-field input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.sign-field{flex:1}
.sign-field label{display:block;font-size:11px;color:#6b7280;margin-bottom:3px}
.sign-box{height:35px;border:1px solid #d1d5db;border-radius:6px;background:white}
/* Score summary */
.score-bar{border-radius:8px;padding:8px 14px;margin-bottom:10px;color:white;position:sticky;top:0;z-index:50;box-shadow:0 3px 10px rgba(0,0,0,.25)}
.sb-basic{background:linear-gradient(135deg,#1e40af,#3b82f6)}
.sb-inter{background:linear-gradient(135deg,#065f46,#10b981)}
.sb-adv{background:linear-gradient(135deg,#9d174d,#ec4899)}
.sb-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.sb-score{font-size:22px;font-weight:bold}
.sb-score span{font-size:13px;opacity:.8}
.sb-right{display:flex;align-items:center;gap:8px}
.sb-pct{font-size:12px;opacity:.9}
.badge{padding:3px 12px;border-radius:999px;font-size:12px;font-weight:bold;background:rgba(255,255,255,.15)}
.badge.pass{background:#16a34a}
.badge.fail{background:#dc2626}
.sb-progress{margin-top:5px}
.sb-bar{height:4px;background:rgba(255,255,255,.3);border-radius:3px;overflow:hidden}
.sb-fill{height:100%;background:#4ade80;border-radius:3px;transition:width .4s}
.sb-meta{display:flex;gap:10px;margin-top:4px;font-size:10px;opacity:.85;flex-wrap:wrap}
/* Key indicator warning */
.key-warn{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#991b1b;display:none}
.key-warn ul{margin-top:4px;padding-left:16px}
/* Table */
.eval-table{width:100%;border-collapse:collapse;margin-bottom:4px;font-size:13px;table-layout:auto}
.eval-table th{background:#f1f5f9;padding:9px 8px;text-align:center;font-weight:600;border:1px solid #e2e8f0;color:#374151;font-size:12px}
.eval-table td{border:1px solid #e2e8f0;padding:7px 8px;vertical-align:middle}
.cat-row td{background:#1e3a5f;color:white;font-weight:bold;padding:9px 12px;font-size:13px}
.item-row:nth-child(even){background:#f9fafb}
.item-row:hover{background:#eff6ff}
.item-name{white-space:nowrap;line-height:1.3}
.item-clickable{cursor:pointer;user-select:none}
.item-clickable:hover{background:#dbeafe!important;color:#1e40af}
.key-item{font-weight:600;color:#991b1b}
.key-star{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;border-radius:3px;padding:1px 4px;font-size:10px;margin-left:4px;font-weight:bold}
/* Score buttons — 상·중·하 한 줄 */
.item-row td{padding-top:3px !important;padding-bottom:3px !important}
.score-btns{display:flex;gap:3px;justify-content:center}
.s-btn{border:2px solid #e5e7eb;background:white;border-radius:6px;padding:2px 5px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s;flex:1;text-align:center}
.s-btn:hover{transform:translateY(-1px)}
.s-btn .s-label{font-weight:bold;display:block}
.s-btn .s-pts{font-size:10px;color:#9ca3af;display:block;white-space:nowrap}
.s-btn.selected-상{background:#dcfce7;border-color:#16a34a;color:#15803d}
.s-btn.selected-상 .s-pts{color:#15803d}
.s-btn.selected-중{background:#fef9c3;border-color:#ca8a04;color:#a16207}
.s-btn.selected-중 .s-pts{color:#a16207}
.s-btn.selected-하{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.s-btn.selected-하 .s-pts{color:#b91c1c}
/* Points display */
.pts-cell{text-align:center;font-weight:bold;font-size:14px;color:#1d4ed8;white-space:nowrap}
.pts-cell.empty{color:#d1d5db;font-weight:normal;font-size:12px;white-space:nowrap}
/* Comment */
.comment-cell textarea{width:100%;border:1px solid #e5e7eb;border-radius:4px;padding:2px 4px;font-size:10px;font-family:inherit;resize:none;line-height:1.4;color:#374151;overflow-y:auto;height:22px;field-sizing:normal}
.comment-cell textarea:focus{outline:none;border-color:#93c5fd}
.comment-cell textarea.show-warn{border-color:#f87171;background:#fff5f5}
/* Category subtotal row */
.subtotal-row td{background:#f8fafc;font-size:12px;color:#475569;text-align:right;padding:6px 10px;border:1px solid #e2e8f0}
.subtotal-row .st-label{text-align:left;font-weight:500}
/* Overall comment */
.overall-section{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-top:16px}
.overall-section label{font-weight:bold;font-size:13px;display:block;margin-bottom:6px;color:#374151}
.overall-section textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px}
/* Buttons */
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;align-items:center}
.btn-row-credit{margin-right:auto;font-size:11px;color:#94a3b8;letter-spacing:.3px}
.btn{padding:9px 20px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:bold;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-reset{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.btn-hide-pts{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.btn-print{background:#1e3a5f;color:white}
/* Toggle pts label */
.pts-hidden .pts-cell:not(:empty){visibility:hidden}
/* Responsive */
@media(max-width:640px){
  .container{padding:8px}
  .card{padding:12px}
  .header h1{font-size:16px}
  .info-grid-top{grid-template-columns:1fr 1fr 1fr auto;gap:4px}
  .info-field input{padding:4px 5px;font-size:11px}
  .btn-ai{font-size:10px;padding:4px 7px;gap:3px;height:27px}
  .evaluator-grid{flex-wrap:wrap}
  .evaluator-field,.sign-field{flex:1;min-width:100px}
  /* 테이블 */
  .eval-table{font-size:11px;table-layout:fixed}
  .eval-table th{font-size:10px;padding:6px 4px}
  .eval-table td{padding:4px 3px}
  .cat-row td{font-size:11px;padding:7px 8px}
  /* colgroup 너비 재정의: 관찰기록 0, 채점·득점 고정 */
  .eval-table colgroup col:nth-child(2){width:116px!important}
  .eval-table colgroup col:nth-child(3){width:38px!important}
  .eval-table colgroup col:nth-child(4){width:0!important}
  /* 관찰기록 셀·헤더 숨김 (▼ 버튼으로 접근 가능) */
  .eval-table .comment-cell{display:none}
  .eval-table thead th:nth-child(4){display:none}
  /* 행동지표: 줄바꿈 허용, 폰트 작게 */
  .item-name{font-size:11px;white-space:normal;word-break:keep-all;line-height:1.4}
  /* 아코디언 상세 행: colspan 유지되도록 전체 너비 */
  .detail-row td{padding:0 6px 6px 6px}
  /* 채점 버튼: 중앙 정렬 */
  .score-btns{justify-content:center}
  .s-btn{padding:2px 3px;font-size:11px;border-width:1px;flex:none}
  .s-btn .s-pts{font-size:9px}
  /* 득점 */
  .pts-cell{font-size:12px}
}
@media(max-width:360px){
  .info-field input{font-size:10px;padding:3px 4px}
  .btn-ai{font-size:9px;padding:3px 5px}
  .btn-ai span{display:none}
}
/* Print */
@media print{.comment-cell textarea::placeholder{color:transparent!important}
  body{background:white}
  .tabs,.btn-row,.key-warn{display:none!important}
  .card{box-shadow:none;padding:10px}
  .tab-pane{display:none!important}
  .tab-pane.print-target{display:block!important}
  .header{background:#1e3a5f!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .score-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cat-row td{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .s-btn.selected-상,.s-btn.selected-중,.s-btn.selected-하{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* 힌트 모달 */
.hint-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.hint-modal-overlay[style*="display:none"]{display:none !important}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal-overlay[style*="display:none"]{display:none !important}
.hint-modal-box{background:#fff;border-radius:12px;padding:20px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.25);max-height:80vh;display:flex;flex-direction:column}
.hint-modal-title{font-size:14px;font-weight:bold;color:#1e3a5f;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0;flex-shrink:0}
.hint-modal-body{font-size:13px;color:#374151;line-height:1.8;overflow-y:auto;white-space:pre-wrap;word-break:keep-all}
.hint-modal-body .hint-line{display:flex;gap:6px;margin-bottom:4px}
.hint-modal-footer{margin-top:14px;text-align:center;flex-shrink:0}
.hint-modal-close{padding:8px 32px;background:#1e3a5f;color:white;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit}
.hint-modal-close:hover{background:#2563eb}
/* 힌트 버튼 */
.btn-hint{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#e0e7ff;border:1px solid #a5b4fc;border-radius:50%;color:#4338ca;font-size:11px;font-weight:bold;cursor:pointer;margin-left:5px;flex-shrink:0;vertical-align:middle;line-height:1}
.btn-hint:hover{background:#c7d2fe;border-color:#6366f1}
/* 아코디언 토글 버튼 */
.btn-toggle{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#e0e7ff;border:1px solid #a5b4fc;border-radius:50%;color:#4338ca;font-size:10px;font-weight:bold;cursor:pointer;margin-left:5px;flex-shrink:0;vertical-align:middle;line-height:1;transition:transform .2s,background .15s}
.btn-toggle:hover{background:#c7d2fe;border-color:#6366f1}
.btn-toggle.open{transform:rotate(180deg);background:#4338ca;color:white;border-color:#4338ca}
/* 아코디언 관찰 기록 행 */
.detail-row{display:none}
.detail-row.open{display:table-row}
/* readonly textarea 스타일 */
.comment-cell textarea[readonly]{background:#fafafa;color:#9ca3af;cursor:pointer}
.comment-cell textarea[readonly]:hover{background:#f3f4f6}
/* 하 평정 행 빨간색 */
.item-row.rating-하 td{background:#fef2f2 !important}
.item-row.rating-하:hover td{background:#fee2e2 !important}
.item-row.rating-하 .item-name{color:#991b1b}

.btn-guide{background:#1e3a5f;color:white}
/* 면접평가표 */
.interview-wrap{margin-top:16px}
.interview-toggle-btn{width:100%;padding:10px 16px;background:linear-gradient(135deg,#065f46,#10b981);color:white;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:between;gap:8px;transition:opacity .2s}
.interview-toggle-btn:hover{opacity:.88}
.interview-toggle-btn .arrow{margin-left:auto;transition:transform .3s}
.interview-toggle-btn.open .arrow{transform:rotate(180deg)}
.interview-body{display:none;margin-top:10px}
.interview-body.open{display:block}
.interview-title{font-size:14px;font-weight:bold;color:#1e3a5f;padding:10px 0 8px;border-bottom:2px solid #1e3a5f;margin-bottom:10px}
.interview-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.interview-table th{background:#065f46;color:white;padding:8px 10px;text-align:center;border:1px solid #065f46;font-size:12px}
.interview-table td{border:1px solid #d1d5db;padding:8px 10px;vertical-align:top;line-height:1.75}
.interview-table .td-num{text-align:center;font-weight:bold;color:#065f46;white-space:nowrap;vertical-align:middle;width:5%}
.interview-table .td-factor{font-weight:bold;color:#1e3a5f;vertical-align:top;width:20%}
.interview-table .td-desc{color:#374151;font-size:12px}
.interview-table .td-method{color:#6b7280;font-size:11px;font-style:italic;margin-bottom:4px}
.interview-table .td-sub{color:#6b7280;font-size:11px;padding-left:12px;line-height:1.6}
.interview-table tr:nth-child(even) td{background:#f9fafb}
.interview-overall{margin-top:10px}
.interview-overall label{font-size:12px;font-weight:bold;color:#065f46;display:block;margin-bottom:4px}
.interview-overall textarea{width:100%;border:1px solid #d1d5db;border-radius:6px;padding:8px;font-size:12px;font-family:inherit;resize:none;line-height:1.6;min-height:80px}
.interview-note{font-size:11px;color:#6b7280;margin-top:4px;line-height:1.6}position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px}
.guide-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px}
.guide-modal-overlay[style*="display:none"]{display:none !important}
.modal-hidden{display:none !important}
.guide-modal-box{background:#f8fafc;border-radius:12px;width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.guide-modal-header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:14px 18px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.guide-modal-header h2{font-size:15px;font-weight:bold}
.guide-modal-header p{font-size:11px;opacity:.8;margin-top:2px}
.guide-modal-close-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.guide-modal-close-btn:hover{background:rgba(255,255,255,.35)}
.guide-modal-body{overflow-y:auto;padding:14px;flex:1}
/* 해설 표 */
.guide-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.guide-table th{background:#1e3a5f;color:white;padding:8px 10px;text-align:center;font-size:12px;border:1px solid #1e3a5f}
.guide-table td{border:1px solid #d1d5db;padding:7px 10px;vertical-align:top;line-height:1.7}
.guide-table .td-cat{background:#334155;color:white;font-weight:bold;font-size:12px;text-align:center;vertical-align:middle}
.guide-table .td-num{text-align:center;color:#475569;font-weight:bold;white-space:nowrap;vertical-align:middle}
.guide-table .td-name{font-weight:bold;color:#1e3a5f;vertical-align:middle}
.guide-table .td-name.is-key{color:#991b1b}
.guide-table .td-pts{text-align:center;font-weight:bold;color:#1d4ed8;white-space:nowrap;vertical-align:middle}
.guide-table .td-detail{color:#374151;font-size:11px}
.guide-table .detail-main{display:flex;gap:4px;line-height:1.7}
.guide-table .detail-sub{color:#6b7280;padding-left:12px;font-size:11px;line-height:1.6}
.guide-table tr:nth-child(even) td:not(.td-cat){background:#f9fafb}
.guide-note{font-size:12px;color:#64748b;padding:8px 12px;background:#f1f5f9;border-radius:6px;margin-bottom:12px;border-left:3px solid #2563eb}
@media(max-width:640px){
  .guide-modal-box{max-height:95vh}
  .guide-table{font-size:11px}
  .guide-table th,.guide-table td{padding:5px 6px}
  .guide-table .td-detail{font-size:10px}
}
/* 해설 탭 */
.guide-sub-tabs{display:flex;gap:6px;margin-bottom:14px}
.guide-sub-btn{flex:1;padding:7px 4px;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer;font-family:inherit;transition:all .2s}
.guide-sub-btn.g1{background:#dbeafe;color:#1e40af}
.guide-sub-btn.g2{background:#d1fae5;color:#065f46}
.guide-sub-btn.g3{background:#fce7f3;color:#9d174d}
.guide-sub-btn.g1.active{background:#1e40af;color:white}
.guide-sub-btn.g2.active{background:#065f46;color:white}
.guide-sub-btn.g3.active{background:#9d174d;color:white}
.guide-pane{display:none}.guide-pane.active{display:block}
.guide-cat{margin-bottom:16px}
.guide-cat-title{background:#1e3a5f;color:white;font-size:13px;font-weight:bold;padding:8px 12px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center}
.guide-cat-title .cat-pts{font-size:11px;opacity:.8;font-weight:normal}
.guide-item{border:1px solid #e2e8f0;border-top:none;padding:10px 12px;background:white}

  b11:'□ 단위지휘관 지정(임무별, 구역별, 방면별, 층별 다양하게 지정)\n□ 진행 경과 지속적 확인 및 임무 조정(소방력 지원·조정)\n□ 현장지휘관으로서 단위지휘관 지정 및 적정운용\n□ 상급지휘관으로부터 수명받은 단위지휘관 임무수행(소속대 활용)',
  b12:'□ 1선 펌프차 및 중요탱크차 지정하여 급수체계 확보\n (40㎜ 300L/min / 65㎜ 600L/min / 방수포 1,800L/min)\n□ 주변 소화전 및 소방시설 활용 등 용수 공급체계 구축\n (소화전 1,000L/min 보수 / 연결송수구, SP, 옥내·외 소화전)',
  b13:'□ 초기 화점 진입 및 인명구조를 위한 파괴장비 활용 신속한 문개방\n□ 문개방 시 화재 이상현상 대비 도어엔트리 절차 준수 지시\n□ 주출입구 내부 진입이 어려울 경우 사다리 활용 등 대책 강구',
  b14:'□ 화재 상황에 맞는 수관(40㎜/65㎜/방수포) 선택 및 전개(연장)\n□ 소방호스 전개 및 관창배치 우선순위 기준\n (RECEO : 생명보호⇢외부연소확대방지⇢내부확대방지⇢화재진압⇢재발방지)',
  b15:'□ 인명구조를 위한 배연(층별 방화문 폐쇄, 옥상문 개방)\n□ 장비 특성에 맞는 배연 방법, 적절한 급기구·배기구 설정\n□ 상황 및 시기에 맞는 배연 실시(인명 우선, 연소확대 제한, 안전 및 시야확보)',
  b16:'□ 표준무전교신 절차 준수(호출 ⇢ 응답 ⇢ 내용 송신 ⇢ 복창 재확인)\n□ 상황에 맞는 정확한 용어 사용\n□ 지휘관 호출 시 수신(무전교신 태세 유지) 및 무전 우선순위 판단\n (대원안전 ⇢ 구조대상자 ⇢ 현장 주요 요소 ⇢ 대응활동)',
  b17:'□ 정확한 의사 전달력 및 적극적인 듣기를 통한 상황인식',
  b18:'□ 현장상황(개요) - 인명구조(피해) - 주요 활동사항 - 기타(추가 소방력, 위험 등)',
  b19:'□ 인명구조 최우선 목표 선정 및 임무수행 적절성\n□ 우선탐색(발화지점 ⇢ 발화층 ⇢ 직상층 ⇢ 상층 ⇢ 하층)\n□ 교차탐색(발화층 및 직상층) / 정밀탐색(관계지역 전체)\n□ 인명구조 관련 정보 신속히 전파(임시의료소 / 지휘대장)',
  b20:'□ 상황평가 후 대응 우선순위에 따라 대원에게 구체적 임무지시(진입금지 명령권 확행)\n□ 위험요인 확인(예측) 및 전파\n□ 공기용기 잔량 확인 및 교대 관리\n□ 대원 고립 및 사고발생 시 조치 등(RIT 운영, 비상탈출로 확보)',

  // ===== 중급 =====
  m1:'□ 상황실 및 선착대 무전 등을 통해 현장 필요정보 파악\n (출동지령서, 소방활동정보카드, 상황실 및 선착대 무전교신)\n□ 주요사항 위주 상황판 기록(건물정보, 인명정보, 화재상황, 대응활동 등)\n□ 중요정보 출동대와 공유 및 대응활동 구상',
  m2:'□ 선착대장과 무전을 통해 정확한 현장상황 파악 및 지휘 활동 지원\n (후착대 배치, 유관기관 요청, 특수차 배치 위치 조정 등)',
  m3:'□ 무전을 통해 현장도착 보고 후 명확하게 지휘권 선언\n (현장 도착보고 ⇢ 상황평가 ⇢ 선착대장 브리핑 ⇢ 지휘권 선언)\n ↳ 급박한 상황의 경우 도착 즉시 지휘권 선언 가능',
  m4:'□ 각 방면을 직접 돌아보거나, 방면 출동대나 지휘대 활용 상황평가 실시\n (구조대상자, 위험정보, 연소확대 상황, 인접 건물 영향, 소방시설 등)\n□ 내·외부에 배치된 출동대로부터 중요정보 및 활동상황 확인·기록\n□ 전략, 방면 지정(A·B·C·D) 및 지휘형태(고정지휘 등) 결정\n□ 최초 상황보고(상황평가 내용, 전략, 방면, 지휘형태, 추가자원 등)\n□ 최초 상황보고 중 위급한 구조대상자 구조 등 긴급사항 시 우선 조치실시',
  m5:'□ 인명정보, 화재 주요 상황, 출동대 배치 등 중요정보 중심으로 파악\n□ 긴급구조현장지휘대 및 구급대 등 동원하여 인명정보 집중 파악·관리',
  m6:'□ 선착대의 초기 대응 및 활동 계획의 유효성 판단\n□ 변경 필요시 전략·전술·임무를 수정하고 각 출동대에 무전 통보',
  m7:'□ 발생가능한 위험요인 판단 후 전략(전술)에 반영 및 지침 제시\n (건물구조, 위험물질, 최성기, 연소확대 등)',
  m8:'□ 상황평가 및 위험성판단을 바탕으로 핵심목표 제시\n (핵심목표 예시 : 인명구조 최우선, 연소확대 저지, 내부 화재진압 등)\n or (예시 : 2층 식당의 인명구조에 집중할 것)',
  m9:'□ 투입된 출동대의 활동상황을 파악하여 맞게 임무 조정\n□ 투입된 출동대의 활동상황을 파악하여 상황평가 결과에 맞게 임무 조정\n□ 출동대 임무대기 무전 시 전술 우선순위 기반 즉시 임무 지시',
  m10:'□ 최초 상황평가 시 자원 요청(소방, 유관기관) 외 필요한 추가 자원 요청\n (최악의 상황 가정, 교대 소방력 고려하여 충분한 자원 요청)\n□ 필요한 경우 대응N단계 발령, 긴급구조통제단 가동 건의',
  m11:'□ 차량 현장접근 통제 및 현장상황에 맞게 차량 배치(대기단계 운영)\n (대기1단계 : 회차가능 / 대기2단계 : 자원대기소)\n□ 특수차량 공간 확보, 1선펌프차 및 중요탱크차 지정',
  m12:'□ 주민(시민)보호 및 소방활동구역을 설정하여 출입 통제\n□ 통제선 설치 및 경찰력 지원 배치 등(1통제선 : 소방 / 2통제선 : 경찰)',
  m13:'□ 1선 펌프차 및 중요탱크차 지정 급수체계 확보 지시\n□ 소화전 점령, 자연 용수, 인근 소화전 없을 시 물탱크차 순환보수 지시',
  m14:'□ 3단계 소방력 배치모델에 따라 출동소방력 배치 및 조정\n (1단계 : 위험구역 / 2단계 : 직전대기 / 3단계 : 예비자원)\n□ 상황변화, 투입시간 경과 등에 따라 출동대 배치 및 조정',
  m15:'□ 구조적(구역별, 방면별, 층별), 기능적(임무별) 분할 단위지휘관 운영\n□ 단위지휘관과 소속대 및 임무 통보',
  m16:'□ 교대조 운영(직전대기), 예비용기 확보 및 교체\n□ 식수 지원 및 대원 회복장소(회복차) 운영',
  m17:'□ 대기1단계 : 1차출동대 차량밀집 방지, 회차가능한 장소에 대기운영\n□ 대기2단계 : 추가소방력 요청에 따른 자원대기소 운영',
  m18:'□ 동원 자원 추적 관리 및 중요정보 등을 상황판에 기록\n (자원배치 및 동원현황, 화재 상황, 구조대상자, 중요 위험요인 등)',
  m19:'□ 구역별 대응활동 핵심목표 및 전술 우선순위 달성 여부 등 파악\n□ 파악된 정보 및 평가 결과를 토대로 대응활동 조정 및 대안 마련\n□ 진행상황 변화에 따른 지속적 검토, 추적관리 및 대응활동 조정',
  m20:'□ 상황악화 원인 및 작전의 효과성을 확인하여 전략(전술) 대응책 강구\n (소방력 추가, 큰 수관 및 포사용, 폼 사용, 특수차 투입, 장비투입 등)',
  m21:'□ 우선순위 보고에 대해 즉시 응대(다른 교신 중에도)하고 적절한 조치',
  m22:'□ 전체 단위지휘관(출동대장)의 초진 보고시 초진 선언(기록, 상황실 통보)\n□ 방면별 초진 보고 시 2차 인명검색, 배연, 잔화정리 지시',
  m23:'□ 전술 우선순위 달성 상황 파악 및 추가 대응 필요시 조치\n (전술우선순위 : 인명구조⇢재산보호⇢사고안정화⇢환경보호)',
  m24:'□ 절차에 따라 완진 선언(기록, 상황실 통보)\n (초진⇢ 배연 및 2차인명검색 지시 ⇢ 직접 현장확인 ⇢ 상황판단회의 ⇢ 완진 선언)',
  m25:'□ 대응 초기 중요정보(중요 상황, 인명 등) 위주 전파토록 무전 통제\n□ 무전폭주시 무선침묵 지시로 통제',
  m26:'□ 현장도착 이후 적절한 시기에 무전망 분리 운영하고 출동대에 명확히 전달\n□ 분리 방식은 지휘관이 탄력적으로 조정(지휘망, 작전망, 지원망)',
  m27:'□ 현장지휘관 중심 무전 운영토록 통제 및 원활한 통신상태 유도\n□ 표준무전교신 절차 준수(호출 ⇢ 응답 ⇢ 내용 송신 ⇢ 복창 재확인)\n□ 지휘관 호출 시 수신(무전교신 태세 유지) 및 무전 우선순위 판단\n (대원안전 ⇢ 구조대상자 ⇢ 현장 주요 요소 ⇢ 대응활동)',
  m28:'□ 통신망 및 무전기 점검\n□ 단위지휘관과 무전 불능 시 아래 순서에 따라 호출\n (호출 순 : 단위지휘관 ⇢ 소속 출동대장 ⇢ 소속 대원 ⇢ 인접 출동대)',
  m29:'□ 지시보다 듣기에 비중을 두고 출동대 전체가 중요정보를 공유토록 유도\n□ 명확한 말투, 정확한 의사 전달력, 적극적인 듣기를 통한 상황인식',
  m30:'□ 돌발상황이나 위기상황 발생 시 침착하고 적절한 대응조치 여부\n (소방차량 고장, 용수 중단, 통신장애, 폭발, 붕괴, 대원고립 등)',
  m31:'□ 본인의 감정과 스트레스를 제어하며 침착하게 현장 지휘 여부\n (침착 유지, 흥분 및 부정적 감정표출 제어, 의사결정 회피 지양 등)\n□ 극심한 스트레스·혼란 속에서도 평정심을 유지하는 심리적 강인함',
  m32:'□ 차분한 응대로 안정감을 주되, 중요 상황에서는 명확·단호한 의사전달\n□ 직관적인 의사결정 및 상황에 맞게 전문성을 발휘한 작전지휘',

function toggleDetail(tabId, itemId, btn) {
  const detailRow = document.getElementById(`${tabId}-detail-${itemId}`);
  if(!detailRow) return;
  detailRow.classList.toggle('open');
  btn.classList.toggle('open');
}

function setScore(tabId, itemId, rating, s0, s1, s2) {
  const scores = {상:s0, 중:s1, 하:s2};
  state[tabId][itemId] = state[tabId][itemId] || {};

  // 토글: 이미 선택된 버튼 재클릭 시 선택 해제
  const alreadySelected = state[tabId][itemId].rating === rating;
  if(alreadySelected) {
    delete state[tabId][itemId].rating;
    const btns = document.querySelectorAll(`#${tabId}-row-${itemId} .s-btn`);
    btns.forEach(btn => btn.classList.remove('selected-상','selected-중','selected-하'));
    const ptsEl = document.getElementById(`${tabId}-pts-${itemId}`);
    ptsEl.textContent = '-'; ptsEl.classList.add('empty');
    const cmtEl = document.getElementById(`${tabId}-cmt-${itemId}`);
    cmtEl.classList.remove('show-warn');
    // 행 빨간색 제거
    document.getElementById(`${tabId}-row-${itemId}`).classList.remove('rating-하');
    updateSummary(tabId);
    return;
  }

  state[tabId][itemId].rating = rating;

  // Update button styles
  const btns = document.querySelectorAll(`#${tabId}-row-${itemId} .s-btn`);
  btns.forEach(btn => {
    btn.classList.remove('selected-상','selected-중','selected-하');
    const label = btn.querySelector('.s-label').textContent;
    if(label === rating) btn.classList.add(`selected-${rating}`);
  });

  // Update points display
  const ptsEl = document.getElementById(`${tabId}-pts-${itemId}`);
  ptsEl.textContent = scores[rating];
  ptsEl.classList.remove('empty');

  // Comment textarea: highlight if 하
  const cmtEl = document.getElementById(`${tabId}-cmt-${itemId}`);
  if(rating === '하') cmtEl.classList.add('show-warn');
  else cmtEl.classList.remove('show-warn');

  // 행 전체 빨간색 토글
  const rowEl = document.getElementById(`${tabId}-row-${itemId}`);
  if(rating === '하') rowEl.classList.add('rating-하');
  else rowEl.classList.remove('rating-하');

  updateSummary(tabId);
}

function updateSummary(tabId) {
  const d = DATA[tabId];
  const s = state[tabId];
  let total = 0, filled = 0;
  let keyFails = [];
  let totalItems = 0;

  d.categories.forEach(cat => {
    cat.items.forEach(item => {
      totalItems++;
      if(s[item.id] && s[item.id].rating) {
        filled++;
        const rating = s[item.id].rating;
        const idx = {상:0,중:1,하:2}[rating];
        total += item.s[idx];
        if(item.key && rating === '하') keyFails.push(item.name);
      }
    });
  });

  const pct = (total / d.maxScore * 100).toFixed(1);
  const passPct = (d.passScore / d.maxScore * 100).toFixed(1);
  const pass = filled === totalItems && total >= d.passScore && keyFails.length === 0;
  const fail = filled === totalItems && (total < d.passScore || keyFails.length > 0);

  // 점수 표시: 득점 / 만점 (합격기준 N점)
  document.getElementById(`${tabId}-total`).innerHTML =
    `${total}<span>/${d.maxScore}점</span>`;
  // 퍼센트: 소수점 1자리, 합격기준 퍼센트도 함께 표시
  document.getElementById(`${tabId}-pct`).innerHTML =
    filled > 0 ? `${pct}% <span style="font-size:11px;opacity:.75">(합격 ${passPct}%)</span>` : '';
  // 프로그레스 바: 합격기준을 100% 기준으로 표시 (합격 시 100% 초과 → 초록)
  const fillPct = Math.min((total / d.passScore) * 100, 100);
  const fillEl = document.getElementById(`${tabId}-fill`);
  fillEl.style.width = `${fillPct}%`;
  fillEl.style.background = total >= d.passScore ? '#4ade80' : '#fbbf24';
  document.getElementById(`${tabId}-items-done`).textContent = `채점완료: ${filled}/${totalItems}`;

  const badge = document.getElementById(`${tabId}-badge`);
  badge.className = 'badge';
  if(pass) { badge.textContent=`합격 (${pct}%)`; badge.classList.add('pass'); }
  else if(fail) { badge.textContent=`불합격 (${pct}%)`; badge.classList.add('fail'); }
  else { badge.textContent='채점중'; }

  const keyStatus = document.getElementById(`${tabId}-key-status`);
  const keyWarn = document.getElementById(`${tabId}-keywarn`);
  if(keyFails.length > 0) {
    keyStatus.textContent = `⚠ 주요지표 하 평정: ${keyFails.length}개`;
    keyWarn.style.display = 'block';
    keyWarn.innerHTML = `<strong>⚠ 주요행동지표(★) 하 평정 항목:</strong><ul>${keyFails.map(n=>`<li>${n}</li>`).join('')}</ul><div style="margin-top:4px;font-size:12px">주요행동지표 '하' 평정은 불합격 사유가 될 수 있습니다.</div>`;
  } else {
    keyStatus.textContent = '주요지표: 이상없음';
    keyWarn.style.display = 'none';
  }
}

let _resetTargetTab = null;

function resetForm(tabId) {
  _resetTargetTab = tabId;

  const existing = document.getElementById('dynamicResetModal');
  if(existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'dynamicResetModal';
  overlay.setAttribute('style', [
    'position:fixed','top:0','left:0','right:0','bottom:0',
    'width:100%','height:100%',
    'background:rgba(0,0,0,0.5)',
    'z-index:99999',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'box-sizing:border-box'
  ].join(';'));

  overlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:28px 28px 20px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.25);text-align:center">
      <p style="font-size:14px;color:#374151;margin:0 0 20px;line-height:1.6">이 평가표의 모든 내용을<br>초기화하시겠습니까?</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button onclick="closeResetModal()" style="padding:8px 24px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;font-weight:bold;cursor:pointer;background:#f1f5f9;color:#475569;font-family:inherit">취소</button>
        <button onclick="confirmReset()" style="padding:8px 24px;border:none;border-radius:7px;font-size:13px;font-weight:bold;cursor:pointer;background:#ef4444;color:white;font-family:inherit">초기화</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
}

function closeResetModal() {
  const modal = document.getElementById('dynamicResetModal');
  if(modal) modal.remove();
  _resetTargetTab = null;
}

function confirmReset() {
  const tabId = _resetTargetTab;   // closeResetModal() 전에 먼저 저장
  closeResetModal();
  if(!tabId) return;

  state[tabId] = {};
  const d = DATA[tabId];
  const totalItems = d.categories.reduce((a,c)=>a+c.items.length,0);

  d.categories.forEach(cat => {
    cat.items.forEach(item => {
      const btns = document.querySelectorAll(`#${tabId}-row-${item.id} .s-btn`);
      btns.forEach(b => b.classList.remove('selected-상','selected-중','selected-하'));
      const pts = document.getElementById(`${tabId}-pts-${item.id}`);
      if(pts){ pts.textContent = '-'; pts.classList.add('empty'); }
      const cmt = document.getElementById(`${tabId}-cmt-${item.id}`);
      if(cmt){ cmt.value = ''; cmt.classList.remove('show-warn'); }
      // 행 빨간색 제거
      const rowEl = document.getElementById(`${tabId}-row-${item.id}`);
      if(rowEl) rowEl.classList.remove('rating-하');
      // 아코디언 닫기
      const detailRow = document.getElementById(`${tabId}-detail-${item.id}`);
      if(detailRow) detailRow.classList.remove('open');
      const toggleBtn = document.getElementById(`${tabId}-toggle-${item.id}`);
      if(toggleBtn) toggleBtn.classList.remove('open');
    });
  });

  // Reset info fields
  ['num','scene','date','eval-rank','eval-name'].forEach(f => {
    const el = document.getElementById(`${tabId}-${f}`);
    if(el) el.value = f==='date' ? new Date().toISOString().slice(0,10) : '';
  });
  const overall = document.getElementById(`${tabId}-overall`);
  if(overall) overall.value = '';

  // Reset score bar
  const fillEl = document.getElementById(`${tabId}-fill`);
  if(fillEl){ fillEl.style.width='0%'; fillEl.style.background='#4ade80'; }
  const totalEl = document.getElementById(`${tabId}-total`);
  if(totalEl) totalEl.innerHTML = `0<span>/${d.maxScore}점</span>`;
  const pctEl = document.getElementById(`${tabId}-pct`);
  if(pctEl) pctEl.innerHTML = '';
  const doneEl = document.getElementById(`${tabId}-items-done`);
  if(doneEl) doneEl.textContent = `채점완료: 0/${totalItems}`;
  const keyStatusEl = document.getElementById(`${tabId}-key-status`);
  if(keyStatusEl) keyStatusEl.textContent = '주요지표: 이상없음';

  // Reset badge
  const badge = document.getElementById(`${tabId}-badge`);
  if(badge){ badge.className='badge'; badge.textContent='미채점'; }

  // Reset key-warn
  const keyWarn = document.getElementById(`${tabId}-keywarn`);
  if(keyWarn){ keyWarn.style.display='none'; keyWarn.innerHTML=''; }
}

function togglePts(tabId, btn) {
  ptsVisible[tabId] = !ptsVisible[tabId];
  const table = document.getElementById(`${tabId}-table`);
  if(!ptsVisible[tabId]) {
    table.querySelectorAll('.s-pts').forEach(el => el.style.display='none');
    btn.textContent = '배점 보이기';
  } else {
    table.querySelectorAll('.s-pts').forEach(el => el.style.display='block');
    btn.textContent = '배점 숨기기';
  }
}

function printForm(tabId) {
  // Mark current tab as print target
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('print-target'));
  document.getElementById(`tab-${tabId}`).classList.add('print-target');
  window.print();
}

function switchTab(tabId, btn) {
  currentTab = tabId;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  btn.classList.add('active');
}

const ivState = {};

function setIvScore(tabId, itemId, rating) {
  if(!ivState[tabId]) ivState[tabId] = {};
  const already = ivState[tabId][itemId] === rating;
  if(already) {
    delete ivState[tabId][itemId];
  } else {
    ivState[tabId][itemId] = rating;
  }
  const btns = document.querySelectorAll(`#iv-row-${itemId} .s-btn`);
  btns.forEach(btn => {
    btn.classList.remove('selected-상','selected-중','selected-하');
    if(!already && btn.querySelector('.s-label').textContent === rating) {
      btn.classList.add(`selected-${rating}`);
    }
  });
}

function buildInterviewTab(tabId) {
  const data = INTERVIEW[tabId];
  let rows = '';
  data.items.forEach(item => {
    rows += `<tr id="iv-row-${item.id}">
      <td class="td-num">${item.num}</td>
      <td class="td-factor">${item.name}</td>
      <td class="td-desc">
        ${item.method ? `<div class="td-method">${item.method}</div>` : ''}
        <div>${item.desc}</div>
        ${item.sub ? `<div class="td-sub">${item.sub}</div>` : ''}
      </td>
      <td style="text-align:center;vertical-align:middle;padding:6px">
        <div class="score-btns" style="justify-content:center">
          <button class="s-btn" onclick="setIvScore('${tabId}','${item.id}','상')"><span class="s-label">상</span></button>
          <button class="s-btn" onclick="setIvScore('${tabId}','${item.id}','중')"><span class="s-label">중</span></button>
          <button class="s-btn" onclick="setIvScore('${tabId}','${item.id}','하')"><span class="s-label">하</span></button>
        </div>
      </td>
      <td class="comment-cell" style="padding:6px">
        <textarea style="width:100%;border:1px solid #e5e7eb;border-radius:4px;padding:3px 5px;font-size:11px;font-family:inherit;resize:none;overflow-y:auto;height:48px" placeholder="평가 근거 기록"></textarea>
      </td>
    </tr>`;
  });

  const totalItems = data.items.length;
  const failLimit = Math.floor(totalItems * 0.2) + 1;

  return `
  <div class="interview-title" style="margin-bottom:8px">${data.title}</div>
  <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#92400e;line-height:1.8">
    <strong>📋 면접평가 합격기준</strong> (현장지휘관 자격인증제 운영매뉴얼 기준)<br>
    ▸ 평가관이 평정요소별로 <strong>상·중·하</strong>로 구분하여 평가<br>
    ▸ 각 평가관의 면접평가 결과를 모두 합산하였을 때 <strong>"하" 평정 항목이 전체 ${totalItems}개 항목의 20%를 초과(${failLimit}개 이상)</strong>하는 경우 불합격 대상자로 처리<br>
    ▸ 면접평가관 회의에서 합의로 불합격 여부 최종 결정
  </div>
  <table class="interview-table">
    <thead>
      <tr>
        <th style="width:4%">번호</th>
        <th style="width:18%">평정요소</th>
        <th>평가 근거 및 설명</th>
        <th style="width:12%">위원 평정</th>
        <th style="width:18%">평가 근거</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="interview-overall">
    <label>종합의견</label>
    <textarea id="${tabId}-interview-overall" placeholder="전체적으로 강점과 약점 등에 대한 종합적 의견을 기재하세요.&#10;(평가 의견은 개인별 평가 결과 통보 시 주요 의견으로 기재되니, 응시자의 역량 향상에 도움이 될 수 있는 의견을 적극 기재하시기 바랍니다)"></textarea>
    <div class="interview-note">※ 전체적으로 강점과 약점 등에 대한 종합적 의견 기재</div>
  </div>`;
}

function showHint(itemId, itemName) {
  const hint = HINTS[itemId];
  if(!hint) return;
  document.getElementById('hintModalTitle').textContent = '📋 ' + itemName;
  // □ 기호로 시작하는 줄마다 줄바꿈 처리
  document.getElementById('hintModalBody').textContent = hint;
  document.getElementById('hintModal').style.display = 'flex';
}
function closeHint() {
  document.getElementById('hintModal').style.display = 'none';
}

        {num:'❻', name:'질문의 이해도', pts:5, key:false, details:[
          '기자 질의 내용에 대한 이해(잘 못 듣거나 난해한 질문 시 재확인)',
        ]},
        {num:'❼', name:'답변태도', pts:5, key:false, details:[
          '기자 질문 경청 및 성실한 답변 태도(자세 및 시선, 공손함, 자신감)',
          '불확실한 정보, 추측성 내용을 답변하지 않도록 주의',
        ]},
        {num:'❽', name:'언론취재의 방향성 제시', pts:5, key:false, details:[
          '언론도 재난현장 공동 대응체라는 인식으로 순기능적 취재 방향 제시',
          ['(사실, 배경, 수행임무, 구체적 수치 제공, 중립성, 비난금지)'],
        ]},
      ]},
    ]
  }
};

function showGuide(tabId) {
  const guideId = tabId.replace('-iv', '');
  const data = GUIDE[guideId];
  if(!data) return;

  const existing = document.getElementById('dynamicGuideModal');
  if(existing) existing.remove();

  // 실기 해설 표
  let bodyHTML = buildGuideTable(data);

  // 중급/고급이면 면접평가표도 추가
  if(guideId === 'inter' || guideId === 'adv') {
    const iv = INTERVIEW[guideId];
    bodyHTML += `
      <div style="margin-top:24px;border-top:2px solid #065f46;padding-top:16px">
        <div style="font-size:14px;font-weight:bold;color:#065f46;margin-bottom:10px">👥 ${iv.title}</div>
        <table class="interview-table">
          <thead>
            <tr>
              <th style="width:6%">번호</th>
              <th style="width:22%">평정요소</th>
              <th>평가 근거 및 설명</th>
            </tr>
          </thead>
          <tbody>
            ${iv.items.map(item => `
              <tr>
                <td class="td-num">${item.num}</td>
                <td class="td-factor">${item.name}</td>
                <td class="td-desc">
                  ${item.method ? `<div class="td-method">${item.method}</div>` : ''}
                  <div>${item.desc}</div>
                  ${item.sub ? `<div class="td-sub">${item.sub}</div>` : ''}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
        <div style="margin-top:8px;font-size:11px;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:8px 12px;line-height:1.8">
          <strong>📋 면접평가 합격기준</strong><br>
          ▸ 평가관이 평정요소별로 <strong>상·중·하</strong>로 구분하여 평가<br>
          ▸ "하" 평정 항목이 전체 ${iv.items.length}개 항목의 20%를 초과(${Math.floor(iv.items.length*0.2)+1}개 이상)하는 경우 불합격 대상자<br>
          ▸ 면접평가관 회의에서 합의로 불합격 여부 최종 결정
        </div>
      </div>`;
  }

  const overlay = document.createElement('div');
  overlay.id = 'dynamicGuideModal';
  overlay.onclick = function(e){ if(e.target===this) closeGuide(); };
  overlay.setAttribute('style', [
    'position:fixed','top:0','left:0','right:0','bottom:0',
    'width:100%','height:100%',
    'background:rgba(0,0,0,0.6)',
    'z-index:99999',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'padding:12px',
    'box-sizing:border-box'
  ].join(';'));

  overlay.innerHTML = `
    <div style="background:#f8fafc;border-radius:12px;width:100%;max-width:860px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.4);overflow:hidden">
      <div style="background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
        <div>
          <div style="font-size:15px;font-weight:bold">${data.title}</div>
          <div style="font-size:11px;opacity:.8;margin-top:2px">✅ ${data.passNote}</div>
        </div>
        <button onclick="closeGuide()" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:white;width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
      <div style="overflow-y:auto;padding:14px;flex:1">${bodyHTML}</div>
    </div>`;

  document.body.appendChild(overlay);
}

function closeGuide() {
  const modal = document.getElementById('dynamicGuideModal');
  if(modal) modal.remove();
}

function buildGuideTable(data) {
  let html = `<table class="guide-table"><thead><tr>
    <th style="width:10%">평가항목</th>
    <th style="width:5%">번호</th>
    <th style="width:20%">행동지표</th>
    <th style="width:5%">배점</th>
    <th>세부사항 (주요내용)</th>
  </tr></thead><tbody>`;

  data.categories.forEach(cat => {
    const totalRows = cat.items.length;
    let firstRow = true;
    cat.items.forEach(item => {
      html += `<tr>`;
      if(firstRow) {
        html += `<td class="td-cat" rowspan="${totalRows}">${cat.name}<br><span style="font-size:10px;opacity:.8;font-weight:normal">(${cat.pts}점)</span></td>`;
        firstRow = false;
      }
      html += `<td class="td-num">${item.num}</td>
        <td class="td-name ${item.key?'is-key':''}">${item.name}${item.key?'<br><span style="font-size:10px;color:#dc2626">★ 주요</span>':''}</td>
        <td class="td-pts">${item.pts}점</td>
        <td class="td-detail">`;
      item.details.forEach(d => {
        if(Array.isArray(d)) {
          html += `<div class="detail-sub">${d[0]}</div>`;
        } else {
          html += `<div class="detail-main">□ <span>${d}</span></div>`;
        }
      });
      html += `</td></tr>`;
    });
  });
  html += `</tbody></table>`;
  return html;
}


</script>
</body>
</html>
